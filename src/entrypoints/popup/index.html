<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perplexity Spaces Backup</title>
  <style>
    :root {
      --primary: #10a37f;
      --primary-hover: #0e8c6d;
      --bg: #f7f7f8;
      --card-bg: #ffffff;
      --text-main: #202123;
      --text-muted: #6e6e80;
      --border: #d9d9e3;
      --accent-yellow: #f59e0b;
      --accent-red: #ef4444;
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
      --radius: 12px;
    }

    body {
      width: 400px;
      margin: 0;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text-main);
      line-height: 1.5;
    }

    /* Full Page Mode Tweaks */
    @media (min-width: 600px) {
      body {
        width: 100%;
        max-width: 800px;
        margin: 0 auto;
        padding: 40px 20px;
      }
    }

    .app-container {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .header {
      text-align: center;
      margin-bottom: 8px;
    }

    .header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .header p {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin: 8px 0 0;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
    }

    .section-title {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .instruction-text {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 12px 16px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    button:hover:not(:disabled) {
      background: var(--primary-hover);
      transform: translateY(-1px);
    }

    button:active:not(:disabled) {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    button.secondary {
      background: white;
      color: var(--text-main);
      border: 1px solid var(--border);
    }

    button.secondary:hover:not(:disabled) {
      background: var(--bg);
    }

    .button-label {
      display: block;
      width: 100%;
    }

    .button-label input {
      display: none;
    }

    /* Spaces List */
    .space-list-container {
      margin-top: 8px;
    }

    .list-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .space-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 500px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .space-item {
      display: flex;
      align-items: center;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      gap: 12px;
      transition: border-color 0.2s;
    }

    .space-item:hover {
      border-color: var(--primary);
    }

    .space-item.is-exists {
      background: #fffdf5;
    }

    .space-info {
      flex: 1;
      min-width: 0;
    }

    .space-title-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 2px;
    }

    .space-title {
      font-weight: 600;
      font-size: 0.95rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .badge {
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .badge-exists { background: #fef3c7; color: #92400e; }
    .badge-new { background: #dcfce7; color: #166534; }
    .badge-done { background: #10a37f; color: #ffffff; }
    .badge-error { background: #fee2e2; color: #991b1b; }

    .create-btn-small {
      width: auto;
      padding: 6px 12px;
      font-size: 0.8rem;
    }

    /* Progress & Status */
    .progress-container {
      margin-top: 20px;
      background: #f0f0f0;
      border-radius: 10px;
      height: 10px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--primary);
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .status-msg {
      margin-top: 12px;
      padding: 12px;
      border-radius: 8px;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-success { background: #dcfce7; color: #166534; }
    .status-error { background: #fee2e2; color: #991b1b; }
    .status-info { background: #e0e7ff; color: #3730a3; }

    /* Checkbox Customization */
    .custom-checkbox {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: var(--primary);
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="./App.ts"></script>
</body>
</html>
